<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NOLA 2026">
  <meta name="theme-color" content="#0d1f3c">
  <title>Peccioli × New Orleans 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; min-height:100vh;
      background: linear-gradient(160deg, #0d1f3c 0%, #17305a 60%, #1a3a6b 100%);
      font-family: -apple-system, 'Inter', sans-serif;
      display:flex; align-items:center; justify-content:center;
    }
    .splash {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:2rem;
      max-width:340px;
    }
    .icon-wrap {
      width:100px; height:100px;
      border-radius:24px; overflow:hidden;
      margin-bottom:1.6rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .icon-wrap img { width:100%; height:100%; object-fit:cover; }
    h1 {
      font-size:1.6rem; font-weight:800;
      color:white; line-height:1.2;
      margin-bottom:0.5rem;
    }
    h1 span { color:#d08c38; }
    .sub {
      font-size:0.85rem;
      color:rgba(255,255,255,0.45);
      margin-bottom:0.5rem;
    }
    .divider {
      width:40px; height:2px;
      background:#d08c38;
      border-radius:2px;
      margin:1.2rem auto 1.4rem;
      opacity:0.6;
    }
    .desc {
      font-size:0.9rem;
      color:rgba(255,255,255,0.6);
      line-height:1.6;
      margin-bottom:2rem;
    }
    .btn {
      display:block;
      width:100%;
      padding:1rem 1.5rem;
      background:#d08c38;
      color:white;
      font-size:1rem;
      font-weight:700;
      border:none;
      border-radius:16px;
      cursor:pointer;
      text-decoration:none;
      box-shadow: 0 6px 20px rgba(208,140,56,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active {
      transform:scale(0.97);
      box-shadow: 0 3px 10px rgba(208,140,56,0.25);
    }
    .note {
      margin-top:1.2rem;
      font-size:0.75rem;
      color:rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="icon-wrap">
      <img src="icon-192.png" alt="NOLA 2026">
    </div>
    <h1>Peccioli × <span>New Orleans</span> 2026</h1>
    <div class="sub">Portale ragazzi · Comune di Peccioli</div>
    <div class="divider"></div>
    <div class="desc">
      Briefing, approfondimenti, mappa interattiva e temi del viaggio.<br>
      Tutto quello che serve per arrivare a New Orleans preparati.
    </div>
    <!-- ⚠️ SOSTITUISCI CON IL TUO LINK STREAMLIT -->
    <a class="btn" https://peccioli-new-orleans.streamlit.app target="_top">
      🎷 Entra nel portale
    </a>
    <div class="note">21–28 settembre 2026 · New Orleans, Louisiana</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
  </script>
</body>
</html>
