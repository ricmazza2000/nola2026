<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peccioli Eyes">
  <meta name="theme-color" content="#130089">
  <title>Peccioli Eyes to New Orleans</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Lobster+Two:ital,wght@1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width:100%; height:100%; min-height:100vh;
      font-family: 'Inter', sans-serif;
      background: #130089;
      overflow: hidden;
    }

    /* Sfondo blu brand pieno + leggero gradiente per profondità */
    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(165deg, #0a0052 0%, #130089 55%, #1a0fb8 100%);
      z-index: 0;
    }

    /* Ponte di linee come texture — ricolorato in blu brand + giallo */
    .bg-image {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 130%;
      max-width: 820px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 1;
    }

    /* Sfumature top/bottom per far respirare il contenuto */
    .bg-fade-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 28%;
      background: linear-gradient(to bottom, rgba(10,0,82,0.95), transparent);
      z-index: 2;
      pointer-events: none;
    }
    .bg-fade-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 42%;
      background: linear-gradient(to top, #130089 0%, rgba(19,0,137,0.6) 40%, transparent 100%);
      z-index: 2;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 3;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3.5rem 1.8rem calc(3rem + env(safe-area-inset-bottom));
      text-align: center;
    }

    /* Label top */
    .top-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* Blocco centrale */
    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .logo-eye {
      width: 120px;
      height: auto;
      margin-bottom: 1rem;
      opacity: 0.95;
    }

    .divider {
      width: 32px;
      height: 2px;
      background: #FFDE59;
      border-radius: 2px;
      margin: 0.3rem 0 0.9rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.3rem, 9.5vw, 3.4rem);
      font-weight: 800;
      color: white;
      line-height: 0.95;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .script-title {
      font-family: 'Lobster Two', cursive;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      color: #FFDE59;
      line-height: 1;
      margin-top: 0.5rem;
      letter-spacing: 0.01em;
    }

    .year-pill {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.3rem 0.9rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,222,89,0.5);
      border-radius: 999px;
    }

    /* Blocco inferiore */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
    }

    .btn-enter {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 1.05rem 1.5rem;
      background: #FFDE59;
      color: #130089;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      border-radius: 14px;
      box-shadow: 0 10px 32px rgba(255, 222, 89, 0.28);
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-enter:active {
      opacity: 0.88;
      transform: scale(0.98);
    }

    .btn-arrow {
      display: inline-block;
      transition: transform 0.2s;
    }

    .btn-enter:active .btn-arrow {
      transform: translateX(4px);
    }

    .note {
      font-size: 0.66rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <img class="bg-image" src="piazza_nola_ponte.png" alt="" aria-hidden="true">
  <div class="bg-fade-top"></div>
  <div class="bg-fade-bottom"></div>

  <div class="content">

    <div class="top-label">Comune di Peccioli &nbsp;·&nbsp; 2026</div>

    <div class="middle">
      <img class="logo-eye" src="peccioli_eyes_logo_white.png" alt="Peccioli Eyes">
      <div class="divider"></div>
      <h1>Peccioli Eyes</h1>
      <div class="script-title">to New Orleans</div>
      <div class="year-pill">2026</div>
    </div>

    <div class="bottom">
      <a class="btn-enter" href="https://new-orleans.onrender.com">
        Entra nel portale <span class="btn-arrow">→</span>
      </a>
      <p class="note">80 ragazzi &nbsp;·&nbsp; 21–28 settembre 2026</p>
    </div>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
  </script>

</body>
</html>
