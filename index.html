<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NOLA 2026">
  <meta name="theme-color" content="#0d1f3c">
  <title>Peccioli × New Orleans 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%; min-height:100vh;
      font-family: 'Inter', sans-serif;
      background: #0d1f3c;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #0a1628 0%, #0d1f3c 50%, #12285a 100%);
      z-index: 0;
    }

    /* Immagine ponte al centro-alto, non in fondo */
    .bg-image {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 120%;
      max-width: 800px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
      filter: invert(1) brightness(1.3);
    }

    /* Gradiente che sfuma sopra e sotto l'immagine */
    .bg-fade-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to bottom, #0a1628, transparent);
      z-index: 2;
    }
    .bg-fade-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, #0d1f3c, transparent);
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3.5rem 2rem 3.5rem;
      text-align: center;
    }

    .top-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .divider {
      width: 28px;
      height: 2px;
      background: #d08c38;
      border-radius: 2px;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2rem, 9vw, 3.2rem);
      font-weight: 800;
      color: white;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    h1 span { color: #d08c38; }

    .subtitle {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      width: 100%;
      max-width: 300px;
    }

    .btn-enter {
      display: block;
      width: 100%;
      padding: 1rem 1.5rem;
      background: #d08c38;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-decoration: none;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(208, 140, 56, 0.28);
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-enter:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .note {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <img class="bg-image" src="piazza_nola_ponte.png" alt="" aria-hidden="true">
  <div class="bg-fade-top"></div>
  <div class="bg-fade-bottom"></div>

  <div class="content">

    <div class="top-label">Comune di Peccioli &nbsp;·&nbsp; 2026</div>

    <div class="middle">
      <div class="divider"></div>
      <h1>Peccioli &times;<br><span>New Orleans</span></h1>
      <p class="subtitle">Il portale del viaggio</p>
    </div>

    <div class="bottom">
      <a class="btn-enter" href="https://new-orleans.onrender.com">
        Entra nel portale →
      </a>
      <p class="note">80 ragazzi &nbsp;·&nbsp; 21–28 settembre 2026</p>
    </div>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
  </script>

</body>
</html>
