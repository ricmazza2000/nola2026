<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NOLA 2026">
  <meta name="theme-color" content="#0d1f3c">

  <title>Peccioli × New Orleans 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background: linear-gradient(160deg, #0d1f3c 0%, #17305a 60%, #1a3a6b 100%);
      font-family: -apple-system, 'Inter', sans-serif;
      display:flex; align-items:center; justify-content:center;
    }
    .splash {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:2rem;
    }
    .icon-wrap {
      width:90px; height:90px;
      background:rgba(255,255,255,0.08);
      border-radius:22px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:1.4rem;
      overflow:hidden;
    }
    .icon-wrap img { width:100%; height:100%; object-fit:cover; border-radius:22px; }
    h1 {
      font-size:1.5rem; font-weight:800;
      color:white; line-height:1.2;
      margin-bottom:0.4rem;
    }
    h1 span { color:#d08c38; }
    p {
      font-size:0.85rem;
      color:rgba(255,255,255,0.45);
      margin-bottom:2.5rem;
    }
    .spinner {
      width:34px; height:34px;
      border:3px solid rgba(255,255,255,0.12);
      border-top-color:#d08c38;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg {
      margin-top:1rem;
      font-size:0.78rem;
      color:rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="icon-wrap">
      <img src="icon-192.png" alt="NOLA 2026">
    </div>
    <h1>Peccioli × <span>New Orleans</span><br>2026</h1>
    <p>Portale ragazzi · Comune di Peccioli</p>
    <div class="spinner"></div>
    <div class="msg">Apertura in corso...</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    }

    // Sostituisci con il tuo link Streamlit
    var APP_URL = "https://TUO-NOME-APP.streamlit.app";

    // Redirect dopo 1.5 secondi (abbastanza per vedere la splash)
    setTimeout(function() {
      window.location.href = APP_URL;
    }, 1500);
  </script>
</body>
</html>
